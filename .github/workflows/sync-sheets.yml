name: Sync sheets to site

# Pulls the KMA Rank Tracker and KMA Class Schedule Google Sheets into the site
# and pushes any changes (Cloudflare Pages then auto-deploys). Runs nightly and
# can be triggered on demand via the "Run workflow" button in the Actions tab.

on:
  schedule:
    - cron: "0 19 * * *"   # 19:00 UTC = 03:00 Manila, daily
  workflow_dispatch: {}     # manual "Run now" button

permissions:
  contents: write

concurrency:
  group: sync-sheets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync roster from KMA Rank Tracker
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python3 scripts/build_roster.py

      - name: Sync schedule from KMA Class Schedule
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python3 scripts/sync_schedule.py

      - name: Commit & push if anything changed
        run: |
          git config user.name "kma-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ schedule/
          if git diff --staged --quiet; then
            echo "No changes — nothing to publish."
          else
            git commit -m "Sync sheets to site (automated)"
            git push
          fi
